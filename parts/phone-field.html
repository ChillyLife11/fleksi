<div class="phone" data-dynamic-phone>
	<button type="button" class="phone__trigger" data-phone-trigger aria-expanded="false">
		<span class="phone__flag" data-phone-flag></span>
		<svg class="phone__chevron" width="8" height="5" viewBox="0 0 8 5" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1l3 3 3-3" stroke="#53575A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
	</button>

	<ul class="phone__list" data-phone-list role="listbox">
		<li>
			<button type="button" class="phone__option" data-phone-option data-dial="+7" data-mask="(000) 000-00-00">
				<span class="phone__flag"><svg class="flag-ic" viewBox="0 0 24 24" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="8" fill="#fff"/><rect y="8" width="24" height="8" fill="#0039A6"/><rect y="16" width="24" height="8" fill="#D52B1E"/></svg></span>
				<span class="phone__name">Россия</span>
				<span class="phone__dial">+7</span>
			</button>
		</li>
		<li>
			<button type="button" class="phone__option" data-phone-option data-dial="+7" data-mask="(000) 000-00-00">
				<span class="phone__flag"><svg class="flag-ic" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="24" fill="#00AFCA"/><circle cx="12" cy="11" r="4" fill="#FEC50C"/></svg></span>
				<span class="phone__name">Казахстан</span>
				<span class="phone__dial">+7</span>
			</button>
		</li>
		<li>
			<button type="button" class="phone__option" data-phone-option data-dial="+375" data-mask="(00) 000-00-00">
				<span class="phone__flag"><svg class="flag-ic" viewBox="0 0 24 24" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="16" fill="#D22730"/><rect y="16" width="24" height="8" fill="#00A651"/></svg></span>
				<span class="phone__name">Беларусь</span>
				<span class="phone__dial">+375</span>
			</button>
		</li>
		<li>
			<button type="button" class="phone__option" data-phone-option data-dial="+374" data-mask="(00) 000-000">
				<span class="phone__flag"><svg class="flag-ic" viewBox="0 0 24 24" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="8" fill="#D90012"/><rect y="8" width="24" height="8" fill="#0033A0"/><rect y="16" width="24" height="8" fill="#F2A800"/></svg></span>
				<span class="phone__name">Армения</span>
				<span class="phone__dial">+374</span>
			</button>
		</li>
	</ul>

	<input type="tel" class="phone__input" data-phone-input required>
</div>
